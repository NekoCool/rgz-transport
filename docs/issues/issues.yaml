issues:
  - title: "transport rewrite roadmap"
    body: |
      ## Purpose
      Rebuild `rgz-transport` from scratch around an async Tokio architecture with official `zeromq` and remove legacy sync/thread + poll patterns. API compatibility is intentionally not preserved for `rgz-transport`.

      ## Scope
      - Target crate: `crates/rgz-transport`
      - Keep only `rgz-msgs` and `rgz-derive` unchanged
      - Create a clean stateful async transport design
      - Define explicit error handling and backpressure policies

      ## Done Criteria
      - Async actor-based transport loop is implemented
      - Publish/subscribe and request/reply work end-to-end
      - State transitions are explicit and testable
      - Shutdown/reconnect/error behavior is deterministic
      - A minimal compatibility test set for new architecture is added
      - Legacy Issue #14 is superseded
    labels:
      - transport-v2
      - architecture
      - breaking-change
      - docs

  - title: "transport-v2 state-machine and lifecycle RFC"
    body: |
      ## Goal
      Define the transport lifecycle and state transitions for the new architecture.

      ## Requirements
      - Define states (`Created`, `Starting`, `Running`, `Degraded`, `Stopping`, `Stopped`)
      - Define valid/invalid transitions and retry/recovery rules
      - Document error states and fallback behavior
      - Add state model tests

      ## Notes
      Parent: transport rewrite roadmap
    labels:
      - transport-v2
      - architecture

  - title: "transport-v2 async actor loop implementation"
    body: |
      ## Goal
      Replace thread + poll transport loop with Tokio async tasks and channels.

      ## Requirements
      - Implement command/event separation (`TxCmd`, `RxEvent`)
      - Convert publish/request/reply processing into async message flow
      - Use bounded channels and explicit shutdown behavior
      - Validate integration with `zeromq` sockets

      ## Notes
      Parent: transport rewrite roadmap
    labels:
      - transport-v2
      - implementation
      - tokio
      - zeromq

  - title: "transport-v2 channel policy and backpressure"
    body: |
      ## Goal
      Standardize internal channel capacities and backpressure handling.

      ## Requirements
      - Define bounded channel sizes for each internal path
      - Decide overflow policy per channel (error/drop/timeout)
      - Add metrics and counters for queue saturation
      - Add validation tests for saturation behavior

      ## Notes
      Parent: transport rewrite roadmap
    labels:
      - transport-v2
      - architecture
      - validation

  - title: "transport-v2 structured errors and retry policy"
    body: |
      ## Goal
      Implement typed transport errors with retryability flags.

      ## Requirements
      - Define error enum including timeout, temporary transport, invalid state, serialization, internal
      - Include retryable/non-retryable classification
      - Integrate with request/reply/publish/public handlers
      - Add tests for each error classification

      ## Notes
      Parent: transport rewrite roadmap
    labels:
      - transport-v2
      - implementation

  - title: "transport-v2 interoperability and stability tests"
    body: |
      ## Goal
      Verify the new transport behaves correctly under expected scenarios.

      ## Test Set
      - pub/sub flow
      - request/reply exchange
      - reconnect and disconnect recovery
      - shutdown and backlog flushing
      - error propagation with retryable/non-retryable cases

      ## Notes
      Parent: transport rewrite roadmap
    labels:
      - transport-v2
      - validation
